#Win+R → gpedit.msc → 计算机配置-管理模板 → 网络 → DNS客户端 → 禁用智能多宿主名称解析 → 已启用 → 应用
#手动节点（可选）（链式代理必须使用此方式）
proxies:

# 把 url 替换成你的 Clash 订阅链接，不用的订阅保持不变即可
proxy-providers:
  订阅1: {type: http, url: "https://ryanvanson.github.io/emptyyaml/empty.yaml", path: ./providers/sub1.yaml, interval: 86400}
  订阅2: {type: http, url: "https://ryanvanson.github.io/emptyyaml/empty.yaml", path: ./providers/sub2.yaml, interval: 86400, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300, lazy: true}}
  订阅3: {type: http, url: "https://ryanvanson.github.io/emptyyaml/empty.yaml", path: ./providers/sub3.yaml, interval: 86400, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300, lazy: true}}

#include-all-proxies: true  包含手动节点/use: [订阅1, 订阅2, 订阅3] 包含订阅节点，domain-strategy: ipv4-only 强制仅使用 IPv4
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - DIRECT
    include-all-proxies: true
    exclude-filter: "DIRECT|MP"
    use: [订阅1, 订阅2, 订阅3]
  - name: Telegram
    type: select
    proxies:
    include-all-proxies: true
    use: [订阅1, 订阅2, 订阅3]
  - name: 流媒体
    type: select
    proxies:
    include-all-proxies: true
    use: [订阅1, 订阅2, 订阅3]
  - name: GIB
    type: select
    proxies:
      - 节点选择
    include-all-proxies: true
    filter: "(?i)UK|GB"
    use: [订阅1, 订阅2, 订阅3]
  - name: UIS
    type: select
    proxies:
      - 节点选择
    include-all-proxies: true
    use: [订阅1, 订阅2, 订阅3]
    filter: "(?i)me|US"
  - name: 容错规则
    type: select
    proxies: [节点选择]
  - name: 无需代理
    type: select
    proxies: [DIRECT]
  - name: 广告拦截
    type: select
    proxies: [REJECT,DIRECT]

mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-system-hosts: true
  prefer-h3: false
  respect-rules: true
  fake-ip-filter:
    - 'rule-set:fake-ip-filter'

#基础DNS服务器，必须先有它才能使用域名类型的DNS配置，因此必须为IP
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
    - https://223.5.5.5/dns-query

#规则匹配到直连时使用的DNS，既然是可以直连的，当然要用国内DNS
  direct-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query	
    
#在访问的国外网站没有匹配到任何域名规则，最终走了MATCH兜底规则时使用的DNS，为了确保不发生DNS泄漏和DNS污染，必须使用国外DNS
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query	

#解析代理节点时使用的DNS，为了使respect-rules生效必须设置，最好设置为国内DNS，否则在代理的第一步就可能因为连接不上国外DNS而解析不出代理节点的IP，最终倒在起点    
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

profile:
  store-selected: true
  store-fake-ip: false
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS: {ports: [443, 8443]}
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    QUIC: {ports: [443, 8443]} 	  
geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb	  
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  mtu: 1500
  strict-route: true
  gso: true
  gso-max-size: 65536
  udp-timeout: 300
  endpoint-independent-nat: false
  include-interface:
    - eth0
  exclude-interface:
    - eth1
  include-uid:
    - 0
  include-uid-range:
    - 1000:9999
  exclude-uid:
    - 1000
  exclude-uid-range:
    - 1000:9999
  include-android-user:
    - 0
    - 10
  include-package:
    - com.android.chrome
  exclude-package:
    - com.android.captiveportallogin

